name: Release

# Publishes to npm when you push a version tag, e.g. git tag v0.3.0 && git push origin v0.3.0
# Required: repo secret NPM_TOKEN (classic or granular with publish). Optional: enable npm
# "Trusted Publisher" for this repo and OIDC — see RELEASING.md

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify
        run: pnpm lint && pnpm format:check && pnpm typecheck && pnpm test

      - name: Build
        run: pnpm build

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
